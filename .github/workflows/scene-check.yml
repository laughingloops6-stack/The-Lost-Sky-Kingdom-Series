name: Scene File Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-scenes:
    name: Check Story Scene Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Required Files
        run: |
          echo "Checking The Lost Sky Kingdom Series files..."

          required_files=(
            "Intro.md"
           )

          for file in "${required_files[@]}"
          do
            if [ -e "$file" ]; then
              echo "✓ Found: $file"
            else
              echo "✗ Missing: $file"
              exit 1
            fi
          done

      - name: Check Scene Files
        run: |
          echo "Checking scenes..."

          - name: Check Scene Files
            run: |
              echo "Checking scenes..."

              for i in 01 02 03 04 05 06 07 08 09 010 011 012
              do
               if [ -f "Scene-$i.md" ]; then
                echo "✓ Scene-$i found"
              else
                echo "❌ Missing Scene-$i.md"
                exit 1
               fi
             done
      - name: Workflow Completed
        run: |
          echo "✅ The Lost Sky Kingdom Series workflow completed successfully!"
